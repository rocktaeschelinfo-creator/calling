<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .counter-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .counter-row:hover {
            background: #e9ecef;
        }

        .label {
            font-weight: bold;
            font-size: 20px;
            color: #667eea;
            min-width: 40px;
        }

        .counter-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            min-width: 50px;
            text-align: center;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        button {
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .btn-up {
            background: #28a745;
            color: white;
            min-width: 40px;
        }

        .btn-up:hover {
            background: #218838;
            transform: scale(1.05);
        }

        .btn-down {
            background: #dc3545;
            color: white;
            min-width: 40px;
        }

        .btn-down:hover {
            background: #c82333;
            transform: scale(1.05);
        }

        .goal-section {
            margin-top: 30px;
            padding: 20px;
            background: #f0f7ff;
            border-radius: 8px;
            border: 2px solid #667eea;
        }

        .goal-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .goal-title {
            font-weight: bold;
            color: #667eea;
            font-size: 16px;
        }

        .goal-input {
            padding: 6px 10px;
            border: 1px solid #667eea;
            border-radius: 4px;
            font-size: 14px;
            width: 80px;
            text-align: center;
        }

        .goal-input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }

        .progress-bar-container {
            background: #e9ecef;
            height: 30px;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            min-width: 40px;
        }

        .progress-text {
            text-align: center;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }

        .timer-section {
            margin-top: 30px;
            padding: 20px;
            background: #fff3cd;
            border-radius: 8px;
            border: 2px solid #ffc107;
        }

        .timer-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: space-between;
        }

        .timer-title {
            font-weight: bold;
            color: #856404;
            font-size: 16px;
        }

        .timer-display {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: #ffc107;
            font-family: 'Courier New', monospace;
            margin: 20px 0;
            min-height: 60px;
        }

        .timer-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-timer {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            color: white;
        }

        .btn-timer-start {
            background: #28a745;
        }

        .btn-timer-start:hover {
            background: #218838;
            transform: scale(1.05);
        }

        .btn-timer-stop {
            background: #ffc107;
            color: #333;
        }

        .btn-timer-stop:hover {
            background: #e0a800;
            transform: scale(1.05);
        }

        .btn-timer-reset {
            background: #dc3545;
        }

        .btn-timer-reset:hover {
            background: #c82333;
            transform: scale(1.05);
        }

        .reset-section {
            margin-top: 30px;
            text-align: center;
        }

        .btn-reset {
            background: #6c757d;
            color: white;
            padding: 10px 30px;
            font-size: 16px;
            min-width: 150px;
        }

        .btn-reset:hover {
            background: #5a6268;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Counter</h1>
        
        <div class="counter-row">
            <div class="label">A</div>
            <div class="counter-value" id="counter-a">0</div>
            <div class="button-group">
                <button class="btn-up" onclick="incrementCounter('a')">+</button>
                <button class="btn-down" onclick="decrementCounter('a')">−</button>
            </div>
        </div>

        <div class="counter-row">
            <div class="label">E</div>
            <div class="counter-value" id="counter-e">0</div>
            <div class="button-group">
                <button class="btn-up" onclick="incrementCounter('e')">+</button>
                <button class="btn-down" onclick="decrementCounter('e')">−</button>
            </div>
        </div>

        <div class="counter-row">
            <div class="label">T</div>
            <div class="counter-value" id="counter-t">0</div>
            <div class="button-group">
                <button class="btn-up" onclick="incrementCounter('t')">+</button>
                <button class="btn-down" onclick="decrementCounter('t')">−</button>
            </div>
        </div>

        <div class="goal-section">
            <div class="goal-header">
                <div class="goal-title">A Ziel:</div>
                <input type="number" id="goal-input" class="goal-input" value="100" onchange="updateGoal()" min="1">
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progress-bar" style="width: 0%">0%</div>
            </div>
            <div class="progress-text">
                <span id="progress-current">0</span> / <span id="progress-goal">100</span>
            </div>
        </div>

        <div class="timer-section">
            <div class="timer-header">
                <div class="timer-title">A Druck Timer</div>
            </div>
            <div class="timer-display" id="timer-display">0.0s</div>
            <div class="timer-buttons">
                <button class="btn-timer btn-timer-start" onclick="startTimer()">Starten</button>
                <button class="btn-timer btn-timer-stop" onclick="stopTimer()">Stoppen</button>
                <button class="btn-timer btn-timer-reset" onclick="resetTimer()">Zurücksetzen</button>
            </div>
        </div>

        <div class="reset-section">
            <button class="btn-reset" onclick="resetAll()">Alles löschen</button>
        </div>
    </div>

    <script>
        let counters = {
            a: 0,
            e: 0,
            t: 0
        };

        let goalValue = 100;
        let timerInterval = null;
        let timerRunning = false;
        let timerSeconds = 0;

        function incrementCounter(key) {
            counters[key]++;
            updateDisplay(key);
            if (key === 'a') {
                updateProgressBar();
                // Automatisch Timer neu starten wenn A gedrückt wird
                resetTimer();
                startTimer();
            }
        }

        function decrementCounter(key) {
            counters[key]--;
            updateDisplay(key);
            if (key === 'a') updateProgressBar();
        }

        function updateDisplay(key) {
            document.getElementById(`counter-${key}`).textContent = counters[key];
        }

        function updateGoal() {
            const newGoal = parseInt(document.getElementById('goal-input').value);
            if (newGoal > 0) {
                goalValue = newGoal;
                updateProgressBar();
            }
        }

        function updateProgressBar() {
            const percentage = Math.min((counters.a / goalValue) * 100, 100);
            const progressBar = document.getElementById('progress-bar');
            progressBar.style.width = percentage + '%';
            progressBar.textContent = Math.round(percentage) + '%';
            
            document.getElementById('progress-current').textContent = counters.a;
            document.getElementById('progress-goal').textContent = goalValue;
        }

        function startTimer() {
            if (!timerRunning) {
                timerRunning = true;
                timerInterval = setInterval(() => {
                    timerSeconds += 0.1;
                    updateTimerDisplay();
                }, 100);
            }
        }

        function stopTimer() {
            if (timerRunning) {
                timerRunning = false;
                clearInterval(timerInterval);
            }
        }

        function resetTimer() {
            stopTimer();
            timerSeconds = 0;
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            document.getElementById('timer-display').textContent = timerSeconds.toFixed(1) + 's';
        }

        function resetAll() {
            counters = { a: 0, e: 0, t: 0 };
            updateDisplay('a');
            updateDisplay('e');
            updateDisplay('t');
            updateProgressBar();
            resetTimer();
        }
    </script>
</body>
</html>
